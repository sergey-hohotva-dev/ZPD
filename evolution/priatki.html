<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Agents Evolution System v2.1 - Data & Speed</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: monospace;
    }
    canvas {
      background: #222;
      border: 3px solid #444;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(16, 16, 20, 0.85);
      padding: 15px;
      border-radius: 8px;
      font-size: 13px;
      max-width: 250px;
      border: 1px solid #333;
    }
    #controls {
      position: absolute;
      top: 10px;
      right: 10px;
      color: white;
      background: rgba(16, 16, 20, 0.85);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #333;
      width: 220px;
    }
    button {
      background: #333;
      color: #eee;
      border: 1px solid #555;
      padding: 8px 12px;
      margin: 4px 0;
      cursor: pointer;
      border-radius: 4px;
      width: 100%;
      font-family: monospace;
      transition: background 0.2s;
    }
    button:hover { background: #444; }
    button:active { background: #222; }
    
    .row { display: flex; gap: 5px; }
    .stat { margin: 5px 0; }
    .hunter-stat { color: #ff6b6b; margin-top: 10px; border-top: 1px solid #444; padding-top: 5px; }
    .runner-stat { color: #51cf66; margin-top: 10px; border-top: 1px solid #444; padding-top: 5px; }
    
    input[type=range] {
        width: 100%;
        margin: 10px 0;
        cursor: pointer;
    }
    
    h3 { margin: 0 0 10px 0; font-size: 16px; color: #aaa; text-align: center; }
    hr { border-color: #333; border-style: solid; }
  </style>
</head>
<body>

<canvas id="game" width="800" height="600"></canvas>

<div id="ui">
  <div class="stat">Охотников: <span id="hunterCount">0</span></div>
  <div class="stat">Бегунов: <span id="runnerCount">0</span></div>
  <div class="stat">Столкновений: <span id="collisionCount">0</span></div>
  <div class="stat">Поколение: <span id="generation">1</span></div>
  <div class="stat" id="generationTimer">До след. поколения: <span>--с</span></div>
  
  <div class="stat hunter-stat" id="topHuntersInfo" style="display: none;">
    <div>Топ охотников (убийства):</div>
    <div id="topHuntersStats"></div>
  </div>
  
  <div class="stat runner-stat" id="topRunnersInfo" style="display: none;">
    <div>Топ бегунов (здоровье):</div>
    <div id="topRunnerStats"></div>
  </div>
</div>

<div id="controls">
  <h3>Управление</h3>
  
  <div class="row">
      <button onclick="addAgents('hunter', 3)">+3 Охотника</button>
      <button onclick="addAgents('runner', 3)">+3 Бегуна</button>
  </div>
  
  <button onclick="togglePause()" id="pauseBtn">Пауза (Space)</button>
  <button onclick="toggleBreeding()" id="breedBtn">Выкл размножение</button>
  
  <div style="margin-top: 10px;">
    <label><input type="checkbox" id="showVision" checked> Показать зрение</label>
  </div>
  
  <hr>
  
  <div style="font-size: 12px; color: #ccc;">
      Ускорение времени: <span id="accValue" style="color: #4cc9f0; font-weight: bold;">1x</span>
  </div>
  <input type="range" id="accSlider" min="1" max="50" value="1" step="1">
  
  <div class="row">
      <button id="btnExportJson">JSON Data</button>
      <button id="btnExportCsv">Excel (CSV)</button>
  </div>
  
  <button onclick="resetSimulation()" style="background: #522; border-color: #844; margin-top: 10px;">Сброс Симуляции</button>
</div>

<script src="config.js"></script>
<script src="simulation_manager.js"></script> 
<script src="genetics.js"></script>
<script src="collision.js"></script>
<script src="evolution.js"></script>
<script src="ui.js"></script>
<script src="main.js"></script>

</body>
</html>
