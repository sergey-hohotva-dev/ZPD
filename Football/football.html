<script>
/* ================== CONFIG ================== */
let TIME_ACCELERATION = 1;
const MILESTONES = [1, 2, 5, 10, 20, 30, 50, 75, 100, 150, 200, 300, 400, 500, 
                    750, 1000, 1500, 2000, 3000, 4000, 5000, 7500, 10000];
const FIELD = { WIDTH: 540, HEIGHT: 720, X: 30, Y: 40, GOAL_ZONE: 80 };
const BOTS_COUNT = 1;

/* ================== NEURAL NETWORK (ИСПРАВЛЕНА) ================== */
class NeuralNet {
    constructor(inputSize, hiddenSize, outputSize) {
        this.inputSize = inputSize;
        this.hiddenSize = hiddenSize;
        this.outputSize = outputSize;
        
        // Инициализация Kaiming He для ReLU
        this.w1 = this.randomMatrix(inputSize, hiddenSize, Math.sqrt(2.0 / inputSize));
        this.b1 = new Float32Array(hiddenSize);
        this.w2 = this.randomMatrix(hiddenSize, outputSize, Math.sqrt(2.0 / hiddenSize));
        this.b2 = new Float32Array(outputSize);
        
        // Счетчики для мониторинга "мертвых" нейронов
        this.deadNeuronsCount = 0;
        this.lastDeadCheck = 0;
    }
    
    randomMatrix(rows, cols, scale) {
        const arr = new Float32Array(rows * cols);
        for (let i = 0; i < rows * cols; i++) {
            arr[i] = (Math.random() * 2 - 1) * scale;
        }
        return arr;
    }
    
    forward(s) {
        const h = new Float32Array(this.hiddenSize);
        let deadNeurons = 0;
        
        for (let j = 0; j < this.hiddenSize; j++) {
            let sum = this.b1[j];
            for (let i = 0; i < this.inputSize; i++) {
                sum += s[i] * this.w1[i * this.hiddenSize + j];
            }
            // ИСПРАВЛЕННЫЙ Leaky ReLU с большим уклоном для отрицательных значений
            h[j] = Math.max(0.2 * sum, sum); // Увеличили с 0.01 до 0.2
        }
        
        const o = new Float32Array(this.outputSize);
        for (let j = 0; j < this.outputSize; j++) {
            let sum = this.b2[j];
            for (let i = 0; i < this.hiddenSize; i++) {
                sum += h[i] * this.w2[i * this.outputSize + j];
            }
            o[j] = sum; // Линейный выходной слой
        }
        
        // Мониторинг "мертвых" нейронов
        if (Date.now() - this.lastDeadCheck > 5000) { // Проверяем каждые 5 секунд
            deadNeurons = h.filter(v => v <= 0.0001).length;
            this.deadNeuronsCount = deadNeurons;
            this.lastDeadCheck = Date.now();
            
            // Автоматическое восстановление при слишком многих мертвых нейронах
            if (deadNeurons > this.hiddenSize * 0.7) { // Если более 70% нейронов мертвы
                console.warn(`Обнаружено ${deadNeurons} мертвых нейронов. Переинициализация...`);
                this.initializeWeights();
            }
        }
        
        return { output: o, hidden: h };
    }
    
    train(s, target, lr = 0.0003) { // Уменьшен learning rate
        const pred = this.forward(s);
        
        // Вычисление градиентов с gradient clipping
        const outputGrad = new Float32Array(this.outputSize);
        for (let i = 0; i < this.outputSize; i++) {
            const error = pred.output[i] - target[i];
            // Gradient clipping для предотвращения взрывных градиентов
            outputGrad[i] = Math.max(-5, Math.min(5, error));
        }
        
        const hiddenGrad = new Float32Array(this.hiddenSize);
        for (let j = 0; j < this.hiddenSize; j++) {
            let sum = 0;
            for (let k = 0; k < this.outputSize; k++) {
                sum += outputGrad[k] * this.w2[j * this.outputSize + k];
            }
            // Leaky ReLU derivative
            hiddenGrad[j] = pred.hidden[j] > 0 ? sum : 0.2 * sum;
        }
        
        // Обновление весов с адаптивным learning rate
        const currentLr = lr * Math.max(0.1, 1.0 - this.deadNeuronsCount / this.hiddenSize);
        
        for (let j = 0; j < this.hiddenSize; j++) {
            for (let k = 0; k < this.outputSize; k++) {
                this.w2[j * this.outputSize + k] -= currentLr * outputGrad[k] * pred.hidden[j];
            }
        }
        
        for (let k = 0; k < this.outputSize; k++) {
            this.b2[k] -= currentLr * outputGrad[k];
        }
        
        for (let i = 0; i < this.inputSize; i++) {
            for (let j = 0; j < this.hiddenSize; j++) {
                this.w1[i * this.hiddenSize + j] -= currentLr * hiddenGrad[j] * s[i];
            }
        }
        
        let loss = 0;
        for (let k = 0; k < this.outputSize; k++) {
            loss += Math.abs(outputGrad[k]);
        }
        return loss / this.outputSize;
    }
    
    initializeWeights() {
        // Переинициализация весов
        this.w1 = this.randomMatrix(this.inputSize, this.hiddenSize, Math.sqrt(2.0 / this.inputSize));
        this.b1 = new Float32Array(this.hiddenSize);
        this.w2 = this.randomMatrix(this.hiddenSize, this.outputSize, Math.sqrt(2.0 / this.hiddenSize));
        this.b2 = new Float32Array(this.outputSize);
        this.deadNeuronsCount = 0;
        console.log("Веса нейросети переинициализированы");
    }
    
    saveWeights() {
        return {
            w1: Array.from(this.w1),
            b1: Array.from(this.b1),
            w2: Array.from(this.w2),
            b2: Array.from(this.b2),
            deadNeuronsCount: this.deadNeuronsCount
        };
    }
    
    loadWeights(weights) {
        this.w1 = new Float32Array(weights.w1);
        this.b1 = new Float32Array(weights.b1);
        this.w2 = new Float32Array(weights.w2);
        this.b2 = new Float32Array(weights.b2);
        this.deadNeuronsCount = weights.deadNeuronsCount || 0;
    }
}

/* ================== AGENT ================== */
class Agent {
    constructor(inputSize, actionSize) {
        this.inputSize = inputSize;
        this.actionSize = actionSize;
        this.gamma = 0.95;
        this.epsilon = 1.0;
        this.epsilonMin = 0.05;
        this.epsilonDecay = 0.99997; // Медленнее decay для стабильности
        this.memory = [];
        this.batchSize = 32;
        this.memoryCapacity = 2000;
        this.net = new NeuralNet(inputSize, 128, actionSize);
    }
    
    act(state) {
        if (Math.random() < this.epsilon) {
            return Math.floor(Math.random() * this.actionSize);
        }
        const res = this.net.forward(state);
        let maxIndex = 0;
        let maxValue = res.output[0];
        for (let i = 1; i < this.actionSize; i++) {
            if (res.output[i] > maxValue) {
                maxValue = res.output[i];
                maxIndex = i;
            }
        }
        return maxIndex;
    }
    
    remember(state, action, reward, nextState, done) {
        if (this.memory.length >= this.memoryCapacity) {
            this.memory.shift();
        }
        this.memory.push({
            state: [...state],
            action: action,
            reward: reward,
            nextState: [...nextState],
            done: done
        });
    }
    
    replay() {
        if (this.memory.length < this.batchSize) return 0;
        
        let totalLoss = 0;
        for (let i = 0; i < this.batchSize; i++) {
            const exp = this.memory[Math.floor(Math.random() * this.memory.length)];
            
            const currentQ = this.net.forward(exp.state).output;
            const nextQ = this.net.forward(exp.nextState).output;
            
            const target = new Float32Array(currentQ);
            target[exp.action] = exp.done ? exp.reward : exp.reward + this.gamma * Math.max(...nextQ);
            
            totalLoss += this.net.train(exp.state, target);
        }
        
        if (this.epsilon > this.epsilonMin) {
            this.epsilon *= this.epsilonDecay;
        }
        
        return totalLoss / this.batchSize;
    }
    
    saveCheckpoint() {
        return {
            net: this.net.saveWeights(),
            epsilon: this.epsilon,
            memorySize: this.memory.length,
            deadNeurons: this.net.deadNeuronsCount
        };
    }
    
    loadCheckpoint(checkpoint) {
        this.net.loadWeights(checkpoint.net);
        this.epsilon = checkpoint.epsilon;
    }
}

/* ================== GAME ================== */
class FootballGame {
    constructor() {
        this.ctx = document.getElementById("game").getContext("2d");
        this.reset();
    }
    
    reset() {
        this.ball = {
            x: 300,
            y: 400,
            vx: (Math.random() - 0.5) * 10,
            vy: 5
        };
        
        this.player = {
            x: 280,
            y: 650,
            width: 40,
            height: 40
        };
        
        this.bots = Array.from({ length: BOTS_COUNT }, () => ({
            x: FIELD.X + Math.random() * (FIELD.WIDTH - 40),
            y: FIELD.Y + Math.random() * 200,
            width: 40,
            height: 40
        }));
    }
    
    update(agent, action) {
        switch(action) {
            case 1: this.player.x -= 5; break;
            case 2: this.player.x += 5; break;
            case 3: this.player.y -= 5; break;
            case 4: this.player.y += 5; break;
        }
        
        this.player.x = Math.max(FIELD.X, Math.min(this.player.x, FIELD.X + FIELD.WIDTH - this.player.width));
        this.player.y = Math.max(FIELD.Y, Math.min(this.player.y, FIELD.Y + FIELD.HEIGHT - this.player.height));
        
        this.ball.x += this.ball.vx;
        this.ball.y += this.ball.vy;
        
        this.ball.vx *= 0.98;
        this.ball.vy *= 0.98;
        
        const playerCenterX = this.player.x + this.player.width / 2;
        const playerCenterY = this.player.y + this.player.height / 2;
        const distToPlayer = Math.hypot(this.ball.x - playerCenterX, this.ball.y - playerCenterY);
        
        let reward = -0.01;
        let done = false;
        
        if (distToPlayer < 35) {
            const dx = this.ball.x - playerCenterX;
            const dy = this.ball.y - playerCenterY;
            this.ball.vx += dx * 0.2;
            this.ball.vy += dy * 0.2;
            reward += 5;
        }
        
        this.bots.forEach(bot => {
            const dx = this.ball.x - (bot.x + bot.width / 2);
            const dy = this.ball.y - (bot.y + bot.height / 2);
            const distance = Math.hypot(dx, dy);
            
            if (distance > 0) {
                bot.x += (dx / distance) * 3;
                bot.y += (dy / distance) * 3;
            }
            
            const botCenterX = bot.x + bot.width / 2;
            const botCenterY = bot.y + bot.height / 2;
            const distToBot = Math.hypot(this.ball.x - botCenterX, this.ball.y - botCenterY);
            
            if (distToBot < 35) {
                this.ball.vx += (Math.random() - 0.5) * 10;
                this.ball.vy += 5;
            }
        });
        
        if (this.ball.x < FIELD.X || this.ball.x > FIELD.X + FIELD.WIDTH) {
            this.ball.vx *= -1;
        }
        
        if (this.ball.y < FIELD.Y + FIELD.GOAL_ZONE) {
            reward = 100;
            done = true;
        }
        if (this.ball.y > FIELD.Y + FIELD.HEIGHT - FIELD.GOAL_ZONE) {
            reward = -100;
            done = true;
        }
        
        if (this.ball.y > FIELD.Y + FIELD.HEIGHT || this.ball.y < FIELD.Y) {
            this.ball.vy *= -1;
        }
        
        const state = [
            (this.ball.x - FIELD.X) / FIELD.WIDTH,
            (this.ball.y - FIELD.Y) / FIELD.HEIGHT,
            this.ball.vx / 20,
            this.ball.vy / 20,
            (this.player.x - FIELD.X) / FIELD.WIDTH,
            (this.player.y - FIELD.Y) / FIELD.HEIGHT,
            ...this.bots.flatMap(bot => [
                (bot.x - FIELD.X) / FIELD.WIDTH,
                (bot.y - FIELD.Y) / FIELD.HEIGHT
            ])
        ];
        
        return { state, reward, done };
    }
    
    draw() {
        const c = this.ctx;
        c.clearRect(0, 0, 600, 800);
        
        c.strokeStyle = "#555";
        c.lineWidth = 2;
        c.strokeRect(FIELD.X, FIELD.Y, FIELD.WIDTH, FIELD.HEIGHT);
        
        c.fillStyle = "rgba(46, 204, 113, 0.1)";
        c.fillRect(FIELD.X, FIELD.Y, FIELD.WIDTH, FIELD.GOAL_ZONE);
        
        c.fillStyle = "rgba(231, 76, 60, 0.1)";
        c.fillRect(FIELD.X, FIELD.Y + FIELD.HEIGHT - FIELD.GOAL_ZONE, FIELD.WIDTH, FIELD.GOAL_ZONE);
        
        c.fillStyle = "white";
        c.beginPath();
        c.arc(this.ball.x, this.ball.y, 15, 0, Math.PI * 2);
        c.fill();
        
        c.fillStyle = "#3498db";
        c.fillRect(this.player.x, this.player.y, this.player.width, this.player.height);
        
        c.fillStyle = "#e74c3c";
        this.bots.forEach(bot => {
            c.fillRect(bot.x, bot.y, bot.width, bot.height);
        });
    }
}

/* ================== APP ================== */
class App {
    constructor() {
        this.game = new FootballGame();
        this.agent = new Agent(8, 5);
        
        this.games = 0;
        this.scoreAI = 0;
        this.scoreBots = 0;
        
        this.currentLoss = [];
        this.currentReward = 0;
        
        this.gameHistory = [];
        this.snapshots = [];
        
        this.episodeRewards = [];
        this.lastMilestoneIndex = 0;
        this.periodAvgRewards = [];
        
        this.lastState = null;
        this.lastAction = 0;
        
        this.fps = 0;
        this.lastFpsUpdate = performance.now();
        this.frameCount = 0;
        this.stepCounter = 0;
        this.lastStepTime = performance.now();
        
        this.drawEveryNFrames = 1;
        this.frameCounter = 0;
        
        // Для экспорта данных
        this.exportFileName = "football_ai_data.json";
        
        this.initCharts();
        this.initControls();
        
        this.loop();
    }
    
    initControls() {
        const accSlider = document.getElementById("accSlider");
        const accValue = document.getElementById("accValue");
        
        accSlider.oninput = (e) => {
            TIME_ACCELERATION = parseInt(e.target.value);
            accValue.innerText = TIME_ACCELERATION;
            
            if (TIME_ACCELERATION > 40) {
                this.drawEveryNFrames = 5;
            } else if (TIME_ACCELERATION > 30) {
                this.drawEveryNFrames = 3;
            } else if (TIME_ACCELERATION > 20) {
                this.drawEveryNFrames = 2;
            } else if (TIME_ACCELERATION > 10) {
                this.drawEveryNFrames = 1;
            } else {
                this.drawEveryNFrames = 1;
            }
        };
        
        accValue.innerText = TIME_ACCELERATION;
        document.getElementById("openSnapshots").onclick = () => this.openSnapshots();
        document.getElementById("exportData").onclick = () => this.exportAllData();
        document.getElementById("resetTraining").onclick = () => this.resetTraining();
    }
    
    initCharts() {
        this.lossChart = new Chart(document.getElementById("lossChart"), {
            type: "line",
            data: {
                labels: [],
                datasets: [{
                    data: [],
                    borderColor: '#e74c3c',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: false
                }]
            },
            options: {
                animation: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { ticks: { color: '#888' } }
                }
            }
        });
        
        this.rewardChart = new Chart(document.getElementById("rewardChart"), {
            type: "line",
            data: {
                labels: [],
                datasets: [{
                    data: [],
                    borderColor: '#3498db',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: false
                }]
            },
            options: {
                animation: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { ticks: { color: '#888' } }
                }
            }
        });
    }
    
    step() {
        this.stepCounter++;
        
        const gameState = [
            (this.game.ball.x - FIELD.X) / FIELD.WIDTH,
            (this.game.ball.y - FIELD.Y) / FIELD.HEIGHT,
            this.game.ball.vx / 20,
            this.game.ball.vy / 20,
            (this.game.player.x - FIELD.X) / FIELD.WIDTH,
            (this.game.player.y - FIELD.Y) / FIELD.HEIGHT,
            ...this.game.bots.flatMap(bot => [
                (bot.x - FIELD.X) / FIELD.WIDTH,
                (bot.y - FIELD.Y) / FIELD.HEIGHT
            ])
        ];
        
        const action = this.agent.act(gameState);
        const result = this.game.update(this.agent, action);
        
        if (this.lastState) {
            this.agent.remember(this.lastState, this.lastAction, result.reward, result.state, result.done);
            const loss = this.agent.replay();
            this.currentLoss.push(loss);
        }
        
        this.lastState = gameState;
        this.lastAction = action;
        this.currentReward += result.reward;
        
        if (result.done) {
            if (result.reward > 0) {
                this.scoreAI++;
            } else {
                this.scoreBots++;
            }
            this.endGame();
        }
    }
    
    updateStats() {
        this.frameCount++;
        const now = performance.now();
        
        if (now - this.lastFpsUpdate > 1000) {
            this.fps = Math.round((this.frameCount * 1000) / (now - this.lastFpsUpdate));
            const stepsPerSec = Math.round((this.stepCounter * 1000) / (now - this.lastStepTime));
            
            document.getElementById("speed").innerText = this.fps;
            document.getElementById("stepsPerSec").innerText = stepsPerSec;
            
            this.frameCount = 0;
            this.stepCounter = 0;
            this.lastFpsUpdate = now;
            this.lastStepTime = now;
            
            // Отображение мертвых нейронов
            if (this.agent.net.deadNeuronsCount > 0) {
                console.log(`Мертвых нейронов: ${this.agent.net.deadNeuronsCount}/${this.agent.net.hiddenSize}`);
            }
        }
    }
    
    endGame() {
        this.games++;
        
        this.episodeRewards.push(this.currentReward);
        
        const avgLoss = this.currentLoss.length > 0 
            ? this.currentLoss.reduce((a, b) => a + b, 0) / this.currentLoss.length 
            : 0;
        
        const record = {
            game: this.games,
            avgLoss: avgLoss,
            reward: this.currentReward,
            epsilon: this.agent.epsilon,
            scoreAI: this.scoreAI,
            scoreBots: this.scoreBots,
            fps: this.fps,
            timeAcceleration: TIME_ACCELERATION,
            deadNeurons: this.agent.net.deadNeuronsCount
        };
        
        this.gameHistory.push(record);
        
        // РАСЧЕТ СРЕДНЕЙ НАГРАДЫ МЕЖДУ РУБЕЖАМИ
        if (MILESTONES.includes(this.games)) {
            const periodRewards = this.episodeRewards.slice(this.lastMilestoneIndex);
            const periodAvgReward = periodRewards.length > 0 
                ? periodRewards.reduce((a, b) => a + b, 0) / periodRewards.length 
                : 0;
            
            this.periodAvgRewards.push({
                milestone: this.games,
                avgReward: periodAvgReward,
                gamesInPeriod: periodRewards.length
            });
            
            document.getElementById("avgReward").innerText = periodAvgReward.toFixed(2);
            
            this.snapshots.push({
                milestone: this.games,
                data: record,
                network: this.agent.saveCheckpoint(),
                periodAvgReward: periodAvgReward,
                gamesInPeriod: periodRewards.length,
                periodRewards: [...periodRewards]
            });
            
            this.lastMilestoneIndex = this.episodeRewards.length;
            
            // Автосохранение после рубежей
            this.autoSave();
        }
        
        // Автоматическая переинициализация при слишком большом количестве мертвых нейронов
        if (this.games % 1000 === 0 && this.agent.net.deadNeuronsCount > this.agent.net.hiddenSize * 0.5) {
            console.log("Автоматическая переинициализация сети из-за мертвых нейронов");
            this.agent.net.initializeWeights();
        }
        
        // Сброс
        this.currentLoss = [];
        this.currentReward = 0;
        this.game.reset();
        this.lastState = null;
        
        this.updateUI();
    }
    
    updateUI() {
        document.getElementById("gameNum").innerText = this.games;
        document.getElementById("ai").innerText = this.scoreAI;
        document.getElementById("bots").innerText = this.scoreBots;
        document.getElementById("eps").innerText = this.agent.epsilon.toFixed(3);
        
        // Оптимизированное обновление графиков для большого количества данных
        if (this.gameHistory.length < 1000) {
            // Для малого количества данных показываем все точки
            if (this.gameHistory.length % 5 === 0) {
                this.lossChart.data.labels = this.gameHistory.map(g => g.game);
                this.lossChart.data.datasets[0].data = this.gameHistory.map(g => g.avgLoss);
                this.rewardChart.data.labels = this.gameHistory.map(g => g.game);
                this.rewardChart.data.datasets[0].data = this.gameHistory.map(g => g.reward);
                
                this.lossChart.update("none");
                this.rewardChart.update("none");
            }
        } else {
            // Для большого количества данных - даунсэмплинг
            if (this.gameHistory.length % 50 === 0) {
                const step = Math.max(1, Math.floor(this.gameHistory.length / 500));
                const sampledData = [];
                const sampledLabels = [];
                const sampledRewards = [];
                
                for (let i = 0; i < this.gameHistory.length; i += step) {
                    sampledLabels.push(this.gameHistory[i].game);
                    sampledData.push(this.gameHistory[i].avgLoss);
                    sampledRewards.push(this.gameHistory[i].reward);
                }
                
                // Добавляем последнюю точку
                if (sampledLabels[sampledLabels.length-1] !== this.gameHistory[this.gameHistory.length-1].game) {
                    const last = this.gameHistory[this.gameHistory.length-1];
                    sampledLabels.push(last.game);
                    sampledData.push(last.avgLoss);
                    sampledRewards.push(last.reward);
                }
                
                this.lossChart.data.labels = sampledLabels;
                this.lossChart.data.datasets[0].data = sampledData;
                this.rewardChart.data.labels = sampledLabels;
                this.rewardChart.data.datasets[0].data = sampledRewards;
                
                this.lossChart.update("none");
                this.rewardChart.update("none");
            }
        }
    }
    
    draw() {
        this.game.draw();
    }
    
    loop() {
        for (let i = 0; i < TIME_ACCELERATION; i++) {
            this.step();
        }
        
        this.updateStats();
        
        this.frameCounter++;
        if (this.frameCounter >= this.drawEveryNFrames) {
            this.draw();
            this.updateUI();
            this.frameCounter = 0;
        }
        
        requestAnimationFrame(() => this.loop());
    }
    
    autoSave() {
        // Автоматическое сохранение данных каждые 5000 игр
        if (this.games % 5000 === 0 && this.games > 0) {
            const data = {
                timestamp: new Date().toISOString(),
                games: this.games,
                gameHistory: this.gameHistory,
                snapshots: this.snapshots,
                periodAvgRewards: this.periodAvgRewards
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `football_ai_auto_save_${this.games}_games.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            console.log(`Автосохранение после ${this.games} игр`);
        }
    }
    
    exportAllData() {
        const exportData = {
            metadata: {
                exportDate: new Date().toISOString(),
                totalGames: this.games,
                scoreAI: this.scoreAI,
                scoreBots: this.scoreBots,
                epsilon: this.agent.epsilon,
                timeAcceleration: TIME_ACCELERATION,
                deadNeurons: this.agent.net.deadNeuronsCount
            },
            gameHistory: this.gameHistory,
            snapshots: this.snapshots,
            periodAvgRewards: this.periodAvgRewards,
            episodeRewards: this.episodeRewards,
            currentNetwork: this.agent.saveCheckpoint()
        };
        
        const blob = new Blob([JSON.stringify(exportData, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `football_ai_${this.games}_games_${Date.now()}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        // Также создаем CSV для Excel
        this.exportCSVData();
    }
    
    exportCSVData() {
        let csv = "Game,AvgLoss,Reward,Epsilon,ScoreAI,ScoreBots,FPS,Acceleration,DeadNeurons\n";
        
        for (const record of this.gameHistory) {
            csv += `${record.game},${record.avgLoss},${record.reward},${record.epsilon},${record.scoreAI},${record.scoreBots},${record.fps},${record.timeAcceleration},${record.deadNeurons || 0}\n`;
        }
        
        const blob = new Blob([csv], {type: 'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `football_ai_${this.games}_games.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
    
    resetTraining() {
        if (confirm("Сбросить обучение и начать заново?")) {
            this.games = 0;
            this.scoreAI = 0;
            this.scoreBots = 0;
            
            this.currentLoss = [];
            this.currentReward = 0;
            
            this.gameHistory = [];
            this.snapshots = [];
            
            this.episodeRewards = [];
            this.lastMilestoneIndex = 0;
            this.periodAvgRewards = [];
            
            this.lastState = null;
            this.lastAction = 0;
            
            this.agent = new Agent(8, 5);
            this.game.reset();
            
            this.updateUI();
            this.lossChart.data.labels = [];
            this.lossChart.data.datasets[0].data = [];
            this.rewardChart.data.labels = [];
            this.rewardChart.data.datasets[0].data = [];
            this.lossChart.update("none");
            this.rewardChart.update("none");
            
            console.log("Обучение сброшено");
        }
    }
    
    openSnapshots() {
        const w = window.open("", "_blank");
        w.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <title>Снапшоты обучения Football AI (1vs1)</title>
                <style>
                    body { font-family: monospace; background: #0b0b12; color: #eee; padding: 20px; }
                    .snapshot { 
                        background: #1a1a1a; 
                        border: 1px solid #333; 
                        margin: 10px 0; 
                        padding: 15px; 
                        border-radius: 5px;
                    }
                    .milestone { color: #4cc9f0; font-weight: bold; }
                    .data { margin-left: 20px; }
                    .config { 
                        background: #2a2a3a; 
                        padding: 10px; 
                        border-radius: 5px;
                        margin-bottom: 20px;
                    }
                    .metric { margin: 5px 0; }
                    .metric-value { color: #2ecc71; }
                    .period-stats { 
                        background: #2a2a2a; 
                        padding: 8px; 
                        margin: 8px 0;
                        border-radius: 4px;
                    }
                    .period-title { color: #f39c12; }
                    .warning { color: #e74c3c; }
                </style>
            </head>
            <body>
                <div class="config">
                    <h3>Статистика обучения (1vs1)</h3>
                    <div class="metric">Всего игр: <span class="metric-value">${this.games}</span></div>
                    <div class="metric">Счёт (ИИ : Бот): <span class="metric-value">${this.scoreAI} : ${this.scoreBots}</span></div>
                    <div class="metric">Текущий epsilon: <span class="metric-value">${this.agent.epsilon.toFixed(4)}</span></div>
                    <div class="metric">Мертвых нейронов: <span class="warning">${this.agent.net.deadNeuronsCount}/128</span></div>
                    <div class="metric">FPS: <span class="metric-value">${this.fps}</span></div>
                </div>
                
                <h2>Снапшоты обучения (${this.snapshots.length} шт.)</h2>
                ${this.snapshots.map((s, index) => {
                    const prevMilestone = index > 0 ? this.snapshots[index-1].milestone : 0;
                    const periodRange = prevMilestone > 0 ? 
                        `${prevMilestone + 1} - ${s.milestone}` : 
                        `1 - ${s.milestone}`;
                    
                    return `
                    <div class="snapshot">
                        <div class="milestone">Рубеж: ${s.milestone} игр (период: ${periodRange})</div>
                        <div class="data">
                            <div class="metric">Ускорение: <span class="metric-value">${s.data.timeAcceleration}x</span></div>
                            <div class="metric">Epsilon: <span class="metric-value">${s.data.epsilon.toFixed(4)}</span></div>
                            <div class="metric">Счёт (ИИ : Бот): <span class="metric-value">${s.data.scoreAI} : ${s.data.scoreBots}</span></div>
                            <div class="metric">Средний Loss: <span class="metric-value">${s.data.avgLoss.toFixed(5)}</span></div>
                            <div class="metric">Мертвых нейронов: <span class="warning">${s.data.deadNeurons || 0}/128</span></div>
                            
                            <div class="period-stats">
                                <div class="period-title">Статистика периода (${periodRange}):</div>
                                <div class="metric">Средняя награда за период: <span class="metric-value">${s.periodAvgReward.toFixed(2)}</span></div>
                                <div class="metric">Игр в периоде: <span class="metric-value">${s.gamesInPeriod}</span></div>
                                <div class="metric">Лучшая награда: <span class="metric-value">${Math.max(...s.periodRewards).toFixed(2)}</span></div>
                                <div class="metric">Худшая награда: <span class="metric-value">${Math.min(...s.periodRewards).toFixed(2)}</span></div>
                            </div>
                            
                            <div class="metric">Размер памяти: <span class="metric-value">${s.network.memorySize}</span></div>
                        </div>
                    </div>
                    `;
                }).join('')}
                
                ${this.periodAvgRewards.length > 0 ? `
                <div class="config">
                    <h3>Средние награды по периодам</h3>
                    ${this.periodAvgRewards.map(p => `
                        <div class="metric">Период до ${p.milestone} игр: 
                            <span class="metric-value">${p.avgReward.toFixed(2)}</span> 
                            (${p.gamesInPeriod} игр)
                        </div>
                    `).join('')}
                </div>
                ` : ''}
                
                <div style="margin-top: 20px;">
                    <button onclick="window.close()" style="padding: 10px; background: #333; color: white; border: none; cursor: pointer;">
                        Закрыть окно
                    </button>
                </div>
            </body>
            </html>
        `);
    }
}

new App();
</script>
